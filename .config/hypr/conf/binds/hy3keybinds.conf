# ╔════════════════════════════════════════════════════════════════════════════╗
# ║                                  Keybinds                                  ║
# ╚════════════════════════════════════════════════════════════════════════════╝

$terminal = kitty
$fileManager = dolphin
$browser = firefox
$menu = /home/Josh/.config/hypr/Scripts/
# ╔══════════════════════╗
# ║     Primary Binds    ║
# ╚══════════════════════╝
bind = SUPER,        Return, exec, $terminal
bind = SUPER,        Q,      killactive,
bind = SUPER,        W,      exec, $menu/wallpaperswitch.sh
bindl = SUPER SHIFT, W,      exec, $menu/wallshuffle.sh
bind = SUPER,        E,      exec, $fileManager
bind = SUPER,        R,      exec, hyprctl reload
bind = SUPER SHIFT,  R,      exec, killall -SIGUSR2 waybar
bind = SUPER,        A,      togglesplit, dwindle
bind = SUPER,        S,      togglespecialworkspace, 
bind = SUPER SHIFT,  S,      movetoworkspace, special
bind = SUPER,        D,      exec, vesktop
bind = SUPER,        F,      exec, $browser
bind = SUPER ALT,    F,      exec, firefox --private-window
bind = SUPER SHIFT,  F,      fullscreen
bind = SUPER,        G,      hy3:changegroup, toggletab
bind = SUPER,        K,      pseudo,
bind = SUPER,        L,      exec, hyprlock
# Special Workspaces #
bind = SUPER,        Z,      togglespecialworkspace, terminal
bind = SUPER,        X,      togglespecialworkspace, tools
bind = SUPER,        C,      togglespecialworkspace, other
bind = SUPER SHIFT,  Z,      movetoworkspace, special:terminal
bind = SUPER SHIFT,  X,      movetoworkspace, special:tools
bind = SUPER SHIFT,  C,      movetoworkspace, special:other

bind = CTRL ALT,     Z,      exec, $menu/Launch/screenreplay.sh
bind = ALT,          Z,      exec, killall -SIGUSR1 gpu-screen-recorder && notify-send "Replay" "Recording Saved in Videos" -i /home/Josh/.config/dunst/video2.png
bind = SUPER,        V,      exec, cliphist list | rofi -dmenu -theme $HOME/.config/rofi/launchers/type-1/style-6 -display-columns 2 | cliphist decode | wl-copy
bind = SUPER ALT,    V,      exec, cliphist wipe
bind = SUPER,        B,      togglefloating,
bind = SUPER,        M,      exec, kitty -e hyprctl clients
bind = SUPER ALT,    Tab,    exec, $menu/workspaced.py
bind = SUPER,        Tab,    hy3:focustab, r, wrap
bind = SUPER SHIFT,  Tab,    hy3:focustab, l, wrap
bind = SUPER,        space,  exec, $menu/launcher.sh
bind = SUPER,        Escape, exec, /home/Josh/.config/rofi/powermenu/type-2/powermenu.sh
bind = CTRL SHIFT,   Escape, exec, kitty -e btop
bindl = SUPER,       Delete, exit,
# ╔══════════════════════╗
# ║       Utilities      ║
# ╚══════════════════════╝
# Function keys #
bind = CTRL,  F1,  exec, $menu/Launch/screenreplay.sh
bind = SHIFT, F1,  exec, $menu/savereplay.sh
    #bind = SUPER, F2, 
    #bind = SUPER, F3, 
    #bind = SUPER, F4, 
    #bind = SUPER, F5, 
    #bind = SUPER, F6, 
    #bind = SUPER, F7, 
    #bind = SUPER, F8, 
    #bind = SUPER, F9, 
    #bind = SUPER, F10, 
    #bind = SUPER, F11, 
bind = CTRL,  F12, exec, killall -SIGINT gpu-screen-recorder && notify-send "Replay" "Recording stopped" -i /home/Josh/.config/dunst/video2.png
# Screenshot #
bind = ,            Print, exec, hyprshot -m output -o /home/Josh/Pictures/Screenshots
bind = SUPER,       Print, exec, hyprshot -m window -o /home/Josh/Pictures/Screenshots
bind = CTRL,        Print, exec, hyprshot -m region -o /home/Josh/Pictures/Screenshots
bind = SHIFT,       Print, exec, hyprshot -m output -o /home/Josh/Pictures/Screenshots --clipboard-only
bind = SUPER SHIFT, Print, exec, hyprshot -m window -o /home/Josh/Pictures/Screenshots --clipboard-only
bind = CTRL SHIFT,  Print, exec, hyprshot -m region -o /home/Josh/Pictures/Screenshots --clipboard-only
# Volume #
bindl =  ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%+ & pkill -RTMIN+8 waybar
bindl =  ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%- & pkill -RTMIN+8 waybar
bindl =  ,XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle & pkill -RTMIN+8 waybar
# Playback Controls #
bindl =  ,XF86AudioStop, exec, playerctl stop
bindl =  ,XF86AudioPrev, exec, playerctl previous
bindl =  ,XF86AudioPlay, exec, playerctl play-pause
bindl =  ,XF86AudioNext, exec, playerctl next
bindl =  ,XF86AudioStop, pass, title:^(Spotify Premium)$
bindl =  ,XF86AudioPrev, pass, title:^(Spotify Premium)$
bindl =  ,XF86AudioPlay, pass, title:^(Spotify Premium)$
bindl =  ,XF86AudioNext, pass, title:^(Spotify Premium)$
# ╔══════════════════════╗
# ║    Window Controls   ║
# ╚══════════════════════╝
# Move window #
bind = SUPER SHIFT, left,  hy3:movewindow, l, visible
bind = SUPER SHIFT, right, hy3:movewindow, r, visible
bind = SUPER SHIFT, up,    hy3:movewindow, u, visible
bind = SUPER SHIFT, down,  hy3:movewindow, d, visible
# Move focus #
bindn = , mouse:272, hy3:focustab, mouse
bind = SUPER, left,  movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up,    movefocus, u
bind = SUPER, down,  movefocus, d
# Move/resize windows #
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
#bindm = , mouse:274, resizewindow
# Resize submap #
bind = ALT, R, submap, resize
# "resize" #
submap = resize
binde =  ,      right,  resizeactive, 10 0
binde =  ,      left,   resizeactive, -10 0
binde =  ,      up,     resizeactive, 0 -10
binde =  ,      down,   resizeactive, 0 10
binde =  SHIFT, right,  resizeactive, 100 0
binde =  SHIFT, left,   resizeactive, -100 0
binde =  SHIFT, up,     resizeactive, 0 -100
binde =  SHIFT, down,   resizeactive, 0 100
bind =   , escape, submap, reset 
submap = reset
# ╔══════════════════════╗
# ║      Workspaces      ║
# ╚══════════════════════╝
# Switch workspaces #
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10
# Move active window to a workspace #
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10
# Move active window to a relative workspace #
bind = SUPER CTRL SHIFT, right, movetoworkspace, r+1
bind = SUPER CTRL SHIFT, left,  movetoworkspace, r-1
# Move window silently to workspace #
bind = SUPER ALT, 1, movetoworkspacesilent, 1
bind = SUPER ALT, 2, movetoworkspacesilent, 2
bind = SUPER ALT, 3, movetoworkspacesilent, 3
bind = SUPER ALT, 4, movetoworkspacesilent, 4
bind = SUPER ALT, 5, movetoworkspacesilent, 5
bind = SUPER ALT, 6, movetoworkspacesilent, 6
bind = SUPER ALT, 7, movetoworkspacesilent, 7
bind = SUPER ALT, 8, movetoworkspacesilent, 8
bind = SUPER ALT, 9, movetoworkspacesilent, 9
bind = SUPER ALT, 0, movetoworkspacesilent, 10
# Scroll through existing workspaces #
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up,   workspace, e-1
# Workspace mind-fuckery #
bind = SUPER CTRL ALT, space, submap, spacewarp
submap = spacewarp
bind = , up,    swapactiveworkspaces, DP-1 DP-2
bind = , down,  exec, $menu/resetworkspaces.sh
bind = , right, movecurrentworkspacetomonitor, DP-1
bind = , left,  movecurrentworkspacetomonitor, DP-2
bind = , a,     workspace, 1
bind = , s,     workspace, 2
bind = , d,     workspace, 3
bind = , f,     workspace, 4
bind = , g,     workspace, 5
bind = , h,     workspace, 6
bind = , j,     workspace, 7
bind = , k,     workspace, 8
bind = , l,     workspace, 9
bind = , p,   workspace, 10
bind = , space, submap, reset 
submap = reset
# Passthrough SUPER KEY to Virtual Machine #
bind =   SUPER, P, submap, passthru
submap = passthru
bind =   SUPER, Escape, submap, reset
submap = reset