# ╔════════════════════════════════════════════════════════════════════════════╗
# ║                                Window Rules                                ║
# ╚════════════════════════════════════════════════════════════════════════════╝
source =         $hypr/screen.conf
# ╔══════════════════════╗
# ║         Vars         ║
# ╚══════════════════════╝
$auth =          polkit-gnome-authentication-agent-1|org.kde.polkit-kde-authentication-agent-1
$calc =          qalculate-gtk
$dolphin =       org.kde.dolphin
$lutris =        net.lutris.Lutris
$prism =         org.prismlauncher.PrismLauncher
$qView =         com.interversehq.qView
$steamBar =      match:initial_class (),  match:initial_title Steam
$steamMenus =    match:initial_class steam, match:initial_title .+
$thunderbird =   org.mozilla.thunderbird
$calendar =      match:title ^(Calendar Reminders)$

# ╔══════════════════════╗
# ║         Tags         ║
# ╚══════════════════════╝
windowrule = tag +media,    match:class mpv|$qView
windowrule = tag +music,    match:class [Ss]potify|tidal-hifi
#=============================================================================================================================================
windowrule = tag +PiP,      match:class chromium-browser
windowrule = tag +PiP,      match:initial_title Discord Popout
windowrule = tag +PiP,      match:title Firefox|Picture-in-Picture|Picture in picture
windowrule = tag +PiP,      match:class teamspeak-client, match:title negative:TeamSpeak
#=============================================================================================================================================
windowrule = tag +vesktop,  match:class vesktop, match:initial_class vesktop
windowrule = tag +vesktop,  match:title vesktop, match:initial_title vesktop
windowrule = tag +vesktop,  match:initial_title Discord
#=============================================================================================================================================
windowrule = tag +launcher, match:class steam|$lutris|heroic|$prism, match:title Steam|Lutris|Heroic Games Launcher|Prism Launcher.*
#=============================================================================================================================================
windowrule = tag +games,    match:class gamescope
windowrule = tag +games,    match:class steam_app_.*, match:title .+
windowrule = tag +games,    match:xdg_tag proton-game

windowrule = tag -games,    match:class (explorer|upc|.*start_protected_game)(.exe)
windowrule = tag -games,    match:title (explorer|upc|.*start_protected_game)(.exe)
windowrule = tag -games,    match:title Ubisoft Connect|EA|Preparing game... #exclude 'gamescope' matches for now
#=============================================================================================================================================
windowrule = tag +gsr,      match:class gsr-ui
windowrule = tag +gsr,      match:initial_class gsr-ui
#windowrule = tag +gsr,      match:title gsr ui
#windowrule = tag +gsr,      match:initial_title gsr ui
#=============================================================================================================================================
windowrule = tag +dialog,   match:class $auth|xdg-desktop-portal-gtk
windowrule = tag +dialog,   match:initial_class gameguard.des|Ubisoft Connect
windowrule = tag +dialog,   match:initial_class steam, match:initial_title negative:Steam
windowrule = tag +dialog,   match:initial_title Save Document?|Ubisoft Connect|EA|Preparing game...
windowrule = tag +dialog,   match:title File Operation Progress|Open Folder|Open Files|Rename ".*"|Progress Dialog — Dolphin|Minecraft.*|Select PPD File|Compact folders|New Text Note — Okular|Page Info —.*
#=============================================================================================================================================
windowrule = tag +browser,  match:class zen, match:title Library
windowrule = tag +browser,  match:title Firefox|Close Firefox|About (Mozilla Firefox|Zen Browser)
#=============================================================================================================================================
windowrule = tag +notif,    match:class Dunst
#-----------------------------------------------------------------------------------------
windowrule = tag +tools,    match:class $calc|hyprland-share-picker|nm-connection-editor|SGDBoop # exclude 'upc.exe' for now
windowrule = tag +tools,    match:title $calendar|.*Rustdesk|Workspace Selector
#=============================================================================================================================================
windowrule = tag +hidden,   match:title Wine System Tray
windowrule = tag +hidden,   match:class explorer.exe|steam_app_.*|xwaylandvideobridge,                 match:title Wayland.*
windowrule = tag +hidden,   match:initial_class explorer.exe|upc.exe|steam_app_.*|xwaylandvideobridge, match:title Wayland.*

# ╔══════════════════════╗
# ║       Animation      ║
# ╚══════════════════════╝
windowrule = animation popin 75%,   match:float 1,
windowrule = animation slide right, match:class Dunst

# ╔══════════════════════╗
# ║    Blur Modifiers    ║
# ╚══════════════════════╝
windowrule = opacity 0.85 0.80,                   match:float 1
windowrule = opacity 0.70 0.60,                   match:tag music

windowrule = opacity 1.00 override 0.75 override, match:title .*(Disney+|Prime Video|Netflix|YouTube).*
windowrule = opacity 0.80 override 0.70 override, match:class Signal|$thunderbird|vesktop
windowrule = opacity 0.70 0.65,                   match:class localsend

# ╔══════════════════════╗
# ║         Rules        ║
# ╚══════════════════════╝
# Fullscreen
windowrule = fullscreen 1,            match:class looking-glass-client
windowrule = fullscreen 0,            match:tag dialog
windowrule = border_size 0,           match:tag dialog
windowrule = border_size 0,           match:fullscreen 1
windowrule = animation fade,          match:fullscreen 1

# Idle Inhibit
windowrule = idle_inhibit fullscreen, match:fullscreen 1
windowrule = idle_inhibit always,     match:class com.obsproject.Studio
windowrule = idle_inhibit always,     match:title .*(Disney+|Prime Video|Netflix|YouTube).*

# Float
windowrule = float 1,  match:tag browser
windowrule = float 1,  match:tag dialog
windowrule = float 1,  match:tag tools
windowrule = center 1, match:float 1
windowrule = center 0, match:initial_title gsr ui

# Pseudotile
windowrule = pseudo 1,                match:class localsend|signal

# Group
windowrule = group set,               match:class rustdesk

# Size/focus
windowrule = persistent_size 1,       match:class .*
windowrule = focus_on_activate 1,     match:class $auth
windowrule = stay_focused 1,          match:title Add bookmark folder|Dolphin|Create New Folder — Dolphin|Steam Dialog|Unlock Keyring|Rename ".*"
#=============================================================================================================================================
windowrule {
    name = Game Settings
    match:tag = games

    # Static Rules
    float =             true
    fullscreen =        true
    content =           game
    group =             deny

    # Dynamic Rules
    opaque =            true
    no_blur =           true
    immediate =         true
    border_size =       0
    idle_inhibit =      always
    keep_aspect_ratio = true
}
windowrule = monitor DP-1,        match:tag games
windowrule = focus_on_activate 1, match:class gamescope, match:title negative:Ubisoft Connect|EA|Preparing game... #include 'gamescope' matches for now
#=============================================================================================================================================
windowrule {
    name = Launcher Settings
    match:tag = launcher

    # Static Rules
    group = new
}
windowrule = group deny, match:class steam, match:initial_title negative:Steam
#=============================================================================================================================================
windowrule {
    name = Picture-in-Picture
    match:tag = PiP

    # Static Rules
    pin =               true
    float =             true
    content =           video
    size =              (monitor_w*0.35) (monitor_h*0.35)
    move =              (monitor_w*0.64) (monitor_h*0.632)
    no_initial_focus =  true

    # Dynamic Rules
    no_dim =            true
    opaque =            true
    no_blur =           true
    border_size =       0
    idle_inhibit =      always
    keep_aspect_ratio = true
}
windowrule = animation slide right,                     match:tag PiP
windowrule = move (monitor_w*0.496) (monitor_h*0.0505), match:initial_title Discord Popout
#=============================================================================================================================================
windowrule {
    name = GSR-UI
    match:tag = gsr

    # Static Rules
    float =             true
    pin =               true
    suppress_event =    fullscreen

    # Dynamic Rules
    rounding =          0
    opacity =           0.9 0.8
    stay_focused =      true
    focus_on_activate = true
}
#=============================================================================================================================================
windowrule {
    name = Media Settings
    match:tag = media

    # Static Rules
    float =             true

    # Dynamic Rules
    opaque =            true
    no_blur =           true
    keep_aspect_ratio = true
}

windowrule {
    name = Hidden-windows
    match:tag = hidden

    # Static Rules
    no_initial_focus = true
    size =             (window_w 0) (window_h 0)

    # Dynamic Rules
    opacity =          0 override 0 override
    opaque =           false
    decorate =         false
    no_anim =          true
    no_blur =          true
    no_focus =         true
    max_size =         (window_w 0) (window_h 0)
}
# ╔══════════════════════╗
# ║   Program Settings   ║
# ╚══════════════════════╝
windowrule {
    name = Steam
    match:class = steam

    # Static Rules
    workspace = 2 silent

    # Dynamic Rules
    opacity = 0.70 override 0.65 override
}
windowrule = no_focus 1,                                 match:title notificationtoasts_19_desktop
windowrule = no_initial_focus 1,                         $steamBar # Loading bar on Steam launch match:initial_class ^()$
windowrule = size (monitor_w*0)+400 (monitor_h*0)+1250,  match:initial_class steam, match:initial_title Friends.*
windowrule = move (monitor_w*0.0)+2146 (monitor_h*0.11), match:initial_class steam, match:initial_title Friends.*
windowrule = animation slide right,                      match:class steam,         match:title Friends List
#=============================================================================================================================================
# Thunderbird FIX LATER
#windowrule = pin,             $thunderbird, $calendar
#windowrule = size 600 150,     $thunderbird, $calendar
#windowrule = maxsize 1200 150, $thunderbird, $calendar
#windowrule = size 750 170,     match:title Compact folders
windowrule = max_size (window_w 425) (window_h 115), match:initial_title Save Message

# ╔══════════════════════╗
# ║      Window Size     ║
# ╚══════════════════════╝
windowrule {
    name = Window Size: 50/50
    match:initial_class = localsend|mpv|$qView|signal|tidal-hifi|upc.exe|vesktop|xdg-desktop-portal-gtk

    size = (monitor_w*0.5) (monitor_h*0.5)
}
windowrule = max_size (monitor_w*0.50) (monitor_h*0.60), match:tag dialog
windowrule = size (monitor_w*0.30) (monitor_h*0.40),     match:initial_class $auth
windowrule = size (monitor_w*30) (monitor_h*0.40),       match:initial_title Add New Virtual Hardware|Mission Disruption Report Needed
# Browser
windowrule = min_size (monitor_w*0.20) (monitor_h*0.33), match:title Removing Cookies and Site Data
# Steam
windowrule = max_size 320 200,                           match:initial_class gameguard.des
windowrule = max_size 714 526,                           match:initial_class Ubisoft Connect
windowrule = max_size 600 380,                           match:initial_title Ubisoft Connect
windowrule = max_size (monitor_w*0.25) (monitor_h*0.25), match:class link2ea.exe

# ╔══════════════════════╗
# ║        Layers        ║
# ╚══════════════════════╝
layerrule = blur 1,                match:namespace waybar|rofi|Dunst|notifications
layerrule = ignore_alpha 0.1,      match:namespace waybar|rofi|Dunst|notifications
layerrule = dim_around 1,          match:namespace rofi
layerrule = order 2,               match:namespace waybar
layerrule = animation slide up,    match:namespace waybar|bar-.*
layerrule = blur_popups 1,         match:namespace .*
layerrule = animation popin 90%,   match:namespace rofi
layerrule = animation fadein,      match:namespace swww-daemon|verification
layerrule = animation slide right, match:namespace notifications-window|notifications
layerrule = no_anim 1,             match:namespace selection|hyprpicker # Fix for screenshot animation clipping into the shot

# ╔══════════════════════╗
