# ============================================================================
# Music Player Widget
# ============================================================================

# ----------------------------------------------------------------------------
# Album Art
# ----------------------------------------------------------------------------
image {
    monitor =       ASUSTek COMPUTER INC VG27A M3LMQS414609
    path =          $HOME/.config/hypr/Scripts/music.webp
    size =          100
    rounding =      5
    border_size =   0
    border_color =  rgba(169, 177, 214, 1)
    shadow_passes = 3
    rotate =        0
    reload_time =   2
    reload_cmd =    ~/.config/hypr/Scripts/hyprlock-music.sh --art
    position =      1050, 63
    halign =        left
    valign =        bottom
    zindex =        1
}

# ----------------------------------------------------------------------------
# Player Background Box
# ----------------------------------------------------------------------------
shape {
    monitor =       ASUSTek COMPUTER INC VG27A M3LMQS414609
    color =         rgba(21, 22, 30, 0.1)
    size =          500, 140
    rounding =      10
    border_size =   3
    border_color =  rgba(15, 15, 15, 0.5)
    shadow_passes = 3
    position =      0, 40
    halign =        center
    valign =        bottom
    zindex =        0
}

# ----------------------------------------------------------------------------
# Track Information
# ----------------------------------------------------------------------------

# Song title
label {
    monitor = ASUSTek COMPUTER INC VG27A M3LMQS414609
    text = cmd[update:1000] echo "$(~/.config/hypr/Scripts/hyprlock-music.sh --title)"
    color = rgba(169, 177, 214, 1)
    font_size = 14
    font_family = JetBrainsMono Nerd Font Heavy
    position = 55, 138
    halign = center
    valign = bottom
    zindex = 1
}

# Player source (e.g., Spotify, Firefox)
label {
    monitor = ASUSTek COMPUTER INC VG27A M3LMQS414609
    text = cmd[update:1000] echo "$(~/.config/hypr/Scripts/hyprlock-music.sh --player)"
    color = rgba(169, 177, 214, 1)
    font_size = 13
    font_family = JetBrainsMono Nerd Font Bold, Font Awesome
    position = 190, 45
    halign = center
    valign = bottom
    zindex = 1
}

# Artist name
label {
    monitor = ASUSTek COMPUTER INC VG27A M3LMQS414609
    text = cmd[update:1000] echo "󰠃  $(~/.config/hypr/Scripts/hyprlock-music.sh --artist)"
    color = rgba(169, 177, 214, 1)
    font_size = 12
    font_family = JetBrainsMono Nerd Font Semibold
    position = 55, 118
    halign = center
    valign = bottom
    zindex = 1
}

# ----------------------------------------------------------------------------
# Playback Controls
# ----------------------------------------------------------------------------

# Previous track button
label {
    monitor = ASUSTek COMPUTER INC VG27A M3LMQS414609
    text = 󰒮
    color = rgba(169, 177, 214, 1)
    font_size = 25
    onclick = playerctl previous
    position = -5, 55
    halign = center
    valign = bottom
}

# Play/Pause button
label {
    monitor = ASUSTek COMPUTER INC VG27A M3LMQS414609
    text = cmd[update:1000] ~/.config/hypr/Scripts/hyprlock-music.sh --status
    color = rgba(169, 177, 214, 1)
    font_size = 25
    onclick = playerctl play-pause
    position = 55, 55
    halign = center
    valign = bottom
}

# Next track button
label {
    monitor = ASUSTek COMPUTER INC VG27A M3LMQS414609
    text = 󰒭
    color = rgba(169, 177, 214, 1)
    font_size = 25
    onclick = playerctl next
    position = 110, 55
    halign = center
    valign = bottom
}

# ----------------------------------------------------------------------------
# Progress Display
# ----------------------------------------------------------------------------

# Current position timestamp
label {
    monitor = ASUSTek COMPUTER INC VG27A M3LMQS414609
    text = cmd[update:1000] echo "$(~/.config/hypr/Scripts/hyprlock-music.sh --position)"
    color = rgba(169, 177, 214, 1)
    font_size = 10
    font_family = SF Pro Display Medium
    position = -100, 95
    halign = center
    valign = bottom
}

# Total length timestamp
label {
    monitor = ASUSTek COMPUTER INC VG27A M3LMQS414609
    text = cmd[update:1000] echo "$(~/.config/hypr/Scripts/hyprlock-music.sh --length)"
    color = rgba(169, 177, 214, 1)
    font_size = 10
    font_family = SF Pro Display Medium
    position = 210, 95
    halign = center
    valign = bottom
}

# Progress bar (with Pango markup for colored segments)
label {
    monitor = ASUSTek COMPUTER INC VG27A M3LMQS414609
    text = cmd[update:1000] ~/.config/hypr/Scripts/hyprlock-music.sh --progress-bar
    color = rgba(169, 177, 214, 1)
    font_size = 12
    font_family = SF Pro Display Medium
    position = 55, 95
    halign = center
    valign = bottom
}
