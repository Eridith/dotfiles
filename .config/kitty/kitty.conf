include /home/Josh/.cache/wal/colors-kitty.conf

# font_family      JetBrainsMono Nerd Font Propo       #MesloLGS NerdFont
# bold_font        MesloLGS NF Bold        #JetBrains Mono Bold
# italic_font      MesloLGS NF Italic      #JetBrains Mono Italic
# bold_italic_font MesloLGS NF Bold Italic #JetBrains Mono Bold Italic
font_family      family="JetBrainsMono Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 14

# Seti-UI + Custom
symbol_map U+E5FA-U+E62B Symbols Nerd Font
# Devicons
symbol_map U+E700-U+E7C5 Symbols Nerd Font
# Font Awesome
symbol_map U+F000-U+F2E0 Symbols Nerd Font
# Font Awesome Extension
symbol_map U+E200-U+E2A9 Symbols Nerd Font
# Material Design Icons
symbol_map U+F500-U+FD46 Symbols Nerd Font
# Weather
symbol_map U+E300-U+E3EB Symbols Nerd Font
# Octicons
symbol_map U+F400-U+F4A8,U+2665,U+26A1,U+F27C Symbols Nerd Font
# Powerline Extra Symbols
symbol_map U+E0A3,U+E0B4-U+E0C8,U+E0CC-U+E0D2,U+E0D4 Symbols Nerd Font
# IEC Power Symbols
symbol_map U+23FB-U+23FE,U+2b58 Symbols Nerd Font
# Font Logos
symbol_map U+F300-U+F313 Symbols Nerd Font
# Pomicons
symbol_map U+E000-U+E00D Symbols Nerd Font

cursor_shape beam
cursor_trail 1
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_margin_width 8.0
tab_bar_edge top
tab_bar_align left

#active_tab_foreground   #000
#active_tab_background   #eee
#active_tab_font_style   bold-italic
#inactive_tab_foreground #444
#inactive_tab_background #999
#inactive_tab_font_style normal

confirm_os_window_close 2

strip_trailing_spaces smart

shell_integration enabled
notify_on_cmd_finish unfocused

# Appearance
background_opacity 0.8
window_padding_width 6.0

kitty_mod           ctrl+shift
map kitty_mod+t     new_tab
map kitty_mod+w     close_tab
map ctrl+tab        next_tab
map ctrl+shift+tab  previous_tab
map kitty_mod+alt+t set_tab_title
map ctrl+alt+1 goto_tab 1
map ctrl+alt+2 goto_tab 2
map ctrl+alt+3 goto_tab 3
map ctrl+alt+4 goto_tab 4
map ctrl+alt+5 goto_tab 5
map kitty_mod+f pass_selection_to_program zen-browser
