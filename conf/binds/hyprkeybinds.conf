$terminal = kitty
$fileManager = thunar #dolphin
$browser = zen-browser #firefox
$menu = /home/Josh/.config/hypr/Scripts/
# ╔══════════════════════╗
# ║     Primary Binds    ║
# ╚══════════════════════╝
bind  = SUPER,        Return, exec, $terminal
bind  = SUPER,        Q,      killactive,
bind  = SUPER,        W,      exec, $menu/wallpaperswitch.sh
bindl = SUPER SHIFT,  W,      exec, $menu/wallshuffle.sh
bind  = SUPER,        E,      exec, $fileManager
bind  = SUPER,        R,      exec, hyprctl reload & killall -SIGUSR2 waybar

bind  = SUPER,        A,      togglesplit, dwindle
bind  = SUPER,        S,      togglespecialworkspace,
bind  = SUPER SHIFT,  S,      movetoworkspace, special
#bind  = SUPER,        D,      exec,
bind  = SUPER,        F,      exec, $browser
bind  = SUPER SHIFT,  F,      fullscreen
bind  = SUPER ALT,    F,      exec, zen-browser --private-window
bind  = SUPER,        G,      togglegroup,
bind  = SUPER,        H,      exec, $menu/keybinds_help.sh
bind  = SUPER,        K,      pseudo,
bind  = SUPER,        L,      exec, hyprlock

bind  = SUPER,        Z,      togglespecialworkspace, terminal
bind  = SUPER,        X,      togglespecialworkspace, tools
bind  = SUPER,        C,      togglespecialworkspace, other
bind  = SUPER SHIFT,  Z,      movetoworkspace, special:terminal
bind  = SUPER SHIFT,  X,      movetoworkspace, special:tools
bind  = SUPER SHIFT,  C,      movetoworkspace, special:other
bind  = ALT SHIFT,    Z,      exec, gsr-ui launch-hide & #notify-send "GPU Screen Recorder" "Daemon launched successfully" &
bind  = SUPER,        V,      exec, cliphist list | rofi -dmenu -theme $HOME/.config/rofi/launchers/type-1/style-6 -display-columns 2 | cliphist decode | wl-copy
bind  = SUPER ALT,    V,      exec, cliphist wipe
bind  = SUPER,        B,      togglefloating,
bind  = SUPER,        M,      exec, kitty --hold sh -c "hyprctl clients"
bind  = CTRL SHIFT,   M,      pass, class:^(vesktop)$
bind  = SUPER,        Tab,    changegroupactive
bind  = SUPER SHIFT,  Tab,    changegroupactive, b #exec, $menu/workspaced.py
bind  = SUPER,        grave,  hyprexpo:expo, toggle
bind  = SUPER,        space,  exec, $menu/launcher.sh
bind  = SUPER,        Escape, exec, /home/Josh/.config/rofi/powermenu/type-2/powermenu.sh
bind  = CTRL SHIFT,   Escape, exec, kitty -e btop
bindl = SUPER,        Delete, exit,

