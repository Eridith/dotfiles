# Screenshot #
bind = ,            Print, exec, hyprshot -m output -o /home/Josh/Pictures/Screenshots
bind = SUPER,       Print, exec, hyprshot -m window -o /home/Josh/Pictures/Screenshots
bind = CTRL,        Print, exec, hyprshot -m region -o /home/Josh/Pictures/Screenshots
bind = SHIFT,       Print, exec, hyprshot -m output -o /home/Josh/Pictures/Screenshots --clipboard-only
bind = SUPER SHIFT, Print, exec, hyprshot -m window -o /home/Josh/Pictures/Screenshots --clipboard-only
bind = CTRL SHIFT,  Print, exec, hyprshot -m region -o /home/Josh/Pictures/Screenshots --clipboard-only

# Volume #
bindl =  ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%+ & pkill -RTMIN+8 waybar
bindl =  ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%- & pkill -RTMIN+8 waybar
bindl =  ,XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle & pkill -RTMIN+8 waybar

# Playback Controls #
bindil =  ,XF86AudioStop, exec, playerctl stop
bindil =  ,XF86AudioPrev, exec, playerctl previous
bindil =  ,XF86AudioPlay, exec, playerctl play-pause
bindil =  ,XF86AudioNext, exec, playerctl next
bindil =  ,XF86AudioPlay, pass, title:^(Spotify Premium)$
bindil =  ,XF86AudioStop, pass, title:^(Spotify Premium)$
bindil =  ,XF86AudioPrev, pass, title:^(Spotify Premium)$
bindil =  ,XF86AudioNext, pass, title:^(Spotify Premium)$

# ╔══════════════════════╗
# ║    Window Controls   ║
# ╚══════════════════════╝
# Move window #
bind = SUPER SHIFT, left,  movewindoworgroup, l
bind = SUPER SHIFT, right, movewindoworgroup, r
bind = SUPER SHIFT, up,    movewindoworgroup, u
bind = SUPER SHIFT, down,  movewindoworgroup, d

# Snap controls for PiP
#bind = SUPER SHIFT, left,  moveactive, -100 0
#bind = SUPER SHIFT, right, moveactive, 100 0
#bind = SUPER SHIFT, up,    moveactive, 0 100
#bind = SUPER SHIFT, down,  moveactive, 0 -100

# Move Group #
bind = SUPER ALT, left,  movewindow, l
bind = SUPER ALT, right, movewindow, r
bind = SUPER ALT, up,    movewindow, u
bind = SUPER ALT, down,  movewindow, d

# Move focus #
bind = SUPER, left,  movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up,    movefocus, u
bind = SUPER, down,  movefocus, d

# Move/resize windows #
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
#bindm = , mouse:274, resizewindow
# Resize submap #
bind = ALT, R, submap, resize

# "resize" #
submap = resize
binde =  , right,       resizeactive, 10 0
binde =  , left,        resizeactive, -10 0
binde =  , up,          resizeactive, 0 -10
binde =  , down,        resizeactive, 0 10
binde = CTRL, right,  resizeactive, 100 0
binde = CTRL, left,   resizeactive, -100 0
binde = CTRL, up,     resizeactive, 0 -100
binde = CTRL, down,   resizeactive, 0 100
binde = SHIFT, left,  movefocus, l
binde = SHIFT, right, movefocus, r
binde = SHIFT, up,    movefocus, u
binde = SHIFT, down,  movefocus, d
binde = SUPER SHIFT, left,  movewindoworgroup, l
binde = SUPER SHIFT, right, movewindoworgroup, r
binde = SUPER SHIFT, up,    movewindoworgroup, u
binde = SUPER SHIFT, down,  movewindoworgroup, d
binde =   , escape, submap, reset
submap = reset

# ╔══════════════════════╗
# ║      Workspaces      ║
# ╚══════════════════════╝
# Switch workspaces #
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move active window to a workspace #
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Move active window to a relative workspace #
bind = SUPER CTRL SHIFT, right, movetoworkspace, r+1
bind = SUPER CTRL SHIFT, left,  movetoworkspace, r-1

# Move window silently to workspace #
bind = SUPER ALT, 1, movetoworkspacesilent, 1
bind = SUPER ALT, 2, movetoworkspacesilent, 2
bind = SUPER ALT, 3, movetoworkspacesilent, 3
bind = SUPER ALT, 4, movetoworkspacesilent, 4
bind = SUPER ALT, 5, movetoworkspacesilent, 5
bind = SUPER ALT, 6, movetoworkspacesilent, 6
bind = SUPER ALT, 7, movetoworkspacesilent, 7
bind = SUPER ALT, 8, movetoworkspacesilent, 8
bind = SUPER ALT, 9, movetoworkspacesilent, 9
bind = SUPER ALT, 0, movetoworkspacesilent, 10

# Scroll through existing workspaces #
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up,   workspace, e-1

# Workspace mind-fuckery #
bind = SUPER CTRL ALT, space, submap, spacewarp
submap = spacewarp
bind = , up, swapactiveworkspaces, DP-1 DP-2
bind = , down, exec, $menu/resetworkspaces.sh
bind = , right, movecurrentworkspacetomonitor, DP-1
bind = , left,  movecurrentworkspacetomonitor, DP-2
bind = , a, workspace, 1
bind = , s, workspace, 2
bind = , d, workspace, 3
bind = , f, workspace, 4
bind = , g, workspace, 5
bind = , h, workspace, 6
bind = , j, workspace, 7
bind = , k, workspace, 8
bind = , l, workspace, 9
bind = , p, workspace, 10
bind = , space, submap, reset
submap = reset

# Passthrough SUPER KEY to Virtual Machine #
bind =   SUPER, P, submap, passthru
submap = passthru
bind =   SUPER, Escape, submap, reset
submap = reset

unbind = , mouse_left
unbind = , mouse_right

#unbind = , mouse:-15
#unbind = , mouse:15

bind = SUPER, mouse_left, workspace, e-1

