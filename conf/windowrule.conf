# ╔════════════════════════════════════════════════════════════════════════════╗
# ║                                Window Rules                                ║
# ╚════════════════════════════════════════════════════════════════════════════╝

# ╔══════════════════════╗
# ║         Vars         ║
# ╚══════════════════════╝
source =         $hypr/screen.conf

$popup =         size 20% 8%
$auth =          polkit-gnome-authentication-agent-1 #org.kde.polkit-kde-authentication-agent-1
$calc =          qalculate-gtk
$dolphin =       org.kde.dolphin
$lutris =        net.lutris.Lutris
$prism =         org.prismlauncher.PrismLauncher
$protonup =      net.davidotek.pupgui2
$qView =         com.interversehq.qView
$thunderbird =   class:^(thunderbird)$
$calendar =      title:^(Calendar Reminders)$

# EXPERIMENTAL
windowrule = persistentsize, class:.*
#class: link2ea.exe
#title: Preparing game...

# ╔══════════════════════╗
# ║         Tags         ║
# ╚══════════════════════╝
windowrule = tag +media,    class:^(mpv|$qView)$
windowrule = tag +music,    class:^([Ss]potify|tidal-hifi)$
windowrule = tag +PiP,      title:^(Firefox|Picture-in-Picture|Picture in picture)$
windowrule = tag +PiP,      class:^(vesktop)$, initialTitle:^(Discord Popout)$
windowrule = tag +PiP,      class:^(chromium-browser)$
windowrule = tag +vid,      title:^(.*)(Disney+|Prime Video|Netflix|YouTube)(.*)$

windowrule = tag +vesktop,  class:^(vesktop)$
windowrule = tag +vesktop,  title:^(vesktop)$
windowrule = tag +vesktop,  initialTitle:^(vesktop)$
windowrule = tag +vesktop,  initialClass:^(vesktop)$
windowrule = tag +vesktop,  initialTitle:^(Discord)$

windowrule = tag +games,    class:^(?!.*start_protected_game\.exe|explorer.exe$).*\.exe$

windowrule = tag +games,    class:^(steam_app_.*)$, title:^(.+)$
windowrule = tag +games,    title:^(Cyberpunk 2077.*|Factorio.*|Minecraft.*)$
windowrule = tag +launcher, class:^(steam|$lutris|heroic|$prism)$, title:^(Steam|Lutris|Heroic Games Launcher|Prism Launcher.*)$

windowrule = tag +popup,    class:^($auth|xdg-desktop-portal-gtk)$
windowrule = tag +popup,    initialTitle:^(Save Document?)$
windowrule = tag +popup,    class:^(zen), title:^(Library)
#windowrule = tag +notif,   class:^(Dunst)$
#windowrule = tag +dialog,

windowrule = tag +hidden,   class:^(explorer.exe|steam_app_.*|xwaylandvideobridge)$, title:^(|Wayland.*)$
windowrule = tag +hidden,   title:^(vesktop|Wine System Tray)$

windowrule = content game,  class:^(?!.*start_protected_game\.exe$).*\.exe$

#windowrule = unset,         class:^(start_protected_game.exe)$
windowrule = content game,  class:^(steam_app_.*)$, title:^(.+)$
windowrule = content game,  title:^(Cyberpunk 2077.*|Factorio.*|Minecraft.*)$

# ╔══════════════════════╗
# ║         Misc         ║
# ╚══════════════════════╝

windowrule = group set,     tag:launcher*
windowrule = group barred,  tag:games*

windowrule = allowsinput,               title:^(EA|Battlefield 4)$
windowrule = stayfocused,               title:^(Add bookmark folder|Dolphin|Create New Folder — Dolphin|Steam Dialog|Unlock Keyring|Rename ".*")$
windowrule = noinitialfocus,            tag:PiP*

# Idle Inhibit
windowrule = idleinhibit always,        tag:PiP*
windowrule = idleinhibit always,        tag:vid*
windowrule = idleinhibit always,        class:^(com.obsproject.Studio)$
windowrule = idleinhibit fullscreen,    fullscreen:1

# Pseudotile
#windowrule = pseudo,                    tag:music*
windowrule = pseudo,                    class:^(localsend)$

# Window effects
windowrule = nodim,                     tag:PiP*
windowrule = noborder,                  tag:PiP*
windowrule = noborder,                  fullscreen:1

# Workspaces
windowrule = workspace 2 silent,        class:^(steam)$
windowrule = workspace[special:tools],  class:^(localsend)$
windowrule = workspace[special:other],  class:^(vesktop)$

# Cava setup
windowrule = animation slide left,      tag:playerleft
windowrule = animation slide bottom,    tag:playerbottom
windowrule = animation slide right,     tag:playerright

# GSR-UI
windowrule = fullscreenstate 0 0,             initialTitle:^(gsr ui)$
windowrule = suppressevent, fullscreenoutput, initialTitle:^(gsr ui)$

# ╔══════════════════════╗
# ║       Animation      ║
# ╚══════════════════════╝
windowrule = animation slide right, tag:PiP*
windowrule = animation popin 75%,   tag:popup*
windowrule = animation popin 75%,   floating:1
windowrule = animation slide right, class:^(Dunst)$

# ╔══════════════════════╗
# ║    Blur Modifiers    ║
# ╚══════════════════════╝
windowrule = opacity 0.85 0.80, floating:1
windowrule = opacity 0.80 0.70, class:^(vesktop)$
windowrule = opacity 1.17 0.95, tag:vid*
windowrule = opacity 0.80 0.70, tag:music*
windowrule = opacity 0.80 0.70, class:^(Signal)$
windowrule = opacity 0.70 0.65, class:^(localsend)$
windowrule = opaque,            tag:PiP*
windowrule = opaque,            tag:media*
windowrule = noblur,            tag:media*
windowrule = noblur,            tag:PiP*

# ╔══════════════════════╗
# ║      Float Rules     ║
# ╚══════════════════════╝
windowrule = float,           tag:popup*
windowrule = float,           tag:dialog*
windowrule = float,           tag:media*
windowrule = float,           tag:PiP
windowrule = float,           class:^($calc|hyprland-share-picker|$protonup|SGDBoop|steam)$
windowrule = float,           title:^($calendar|File Operation Progress|Open Folder|Open Files|Rename ".*"|Workspace Selector|Firefox|Close Firefox|About Mozilla Firefox|About Zen Browser|Progress Dialog — Dolphin|Minecraft.*|Select PPD File|Compact folders|New Text Note — Okular)$

windowrule = center,          class:^($auth|Electron|hyprland-share-picker|$qView)$
windowrule = center,          title:^(Open Folder|Open Files|File Upload|LibreOffice|Progress Dialog — Dolphin|Ubisoft Connect|Compact folders|Removing Cookies and Site Data|Save Message|steam|Select Image|Are you sure you want to quit?)$
windowrule = center,          class:^(steam)$, title:^(.+)$
windowrule = center,          class:^($prism)$, title:^(New Instance.*)$
windowrule = center,          initialClass:^()$, initialTitle:^(Steam)$ #popup for the steam loading bar

windowrule = pin,             tag:PiP*
windowrule = pin,             $thunderbird, $calendar

windowrule = keepaspectratio, tag:PiP*
windowrule = keepaspectratio, tag:media*

windowrule = tile,            title:^(Steam)$

# ╔══════════════════════╗
# ║      Window Size     ║
# ╚══════════════════════╝
windowrule = maxsize 20% 8%,   tag:popup
windowrule = size 30% 40%,     class:^($auth)$
windowrule = size 30% 40%,     title:^(Add New Virtual Hardware|Mission Disruption Report Needed)$
windowrule = size 50% 50%,     class:^(Signal|mpv|$qView|vesktop)$
windowrule = size 50% 50%,     tag:music*

# PrismLauncher
windowrule = size 20% 20%,     title:^(Choose a mod provider.*)$
windowrule = size 50% 50%,     class:^($prism)$, title:^(New Instance.*)$

# QEMU
windowrule = size 30% 45%,     title:^(Add New Virtual Hardware)$

# File picker
windowrule = size 50% 50%,     title:^(Open Folder|File Upload|.*[Ss]ave.*)$
windowrule = size 50% 50%,     class:^(xdg-desktop-portal-gtk)$

# Browser
windowrule = $popup,           class:^(firefox)$, title:^(Close Firefox|Open Firefox in Troubleshoot Mode?)$
windowrule = minsize 20% 33%,  title:^(Removing Cookies and Site Data)$

# Localsend
windowrule = size 50% 50%,     class:^(localsend)$

# PiP
windowrule = size 35% 35%,     tag:PiP*
windowrule = move 64% 63%,     tag:PiP*
windowrule = move 49.6% 5.05%, initialTitle:^(Discord Popout)$

# Steam
windowrule = size 10% 45%,     class:^(steam)$, title:^(Friends.*)$

# Thunderbird
windowrule = size 600 150,     $thunderbird, $calendar
windowrule = maxsize 1200 150, $thunderbird, $calendar
windowrule = size 750 170,     title:^(Compact folders)$
windowrule = maxsize 425 115,  title:^(Save Message)$

# Misc
windowrule = maxsize 25% 25%,  class:^(link2ea.exe)$
windowrule = fullscreen,       class:^(looking-glass-client)$

# ╔══════════════════════╗
# ║         Steam        ║
# ╚══════════════════════╝
windowrule = opaque,            tag:games*
windowrule = noblur,            tag:games*
windowrule = noborder,          tag:games*
windowrule = monitor 0,         tag:games*
windowrule = immediate,         tag:games*
windowrule = fullscreen,        tag:games*
windowrule = workspace 2,       tag:games*
windowrule = focusonactivate,   tag:games*
windowrule = unset,             title:^(steam|notificationtoasts_19_desktop)$
windowrule = noinitialfocus,    title:^(steam|notificationtoasts_19_desktop)$ # Steam notifications and (maybe?) the loading bar on launch

# VR
#windowrule = workspace 5,       class:^(steam_app_.*)$, title:^(.*)$
#windowrule = center,            class:^(vrmonitor$)
#windowrule = move 50% 50%,      class:^(vrmonitor)$, title:^(statusthingy)$

#Kill (steam), (Special Offers) on sight; hyprctl dispatch closewindow title:^(Special Offers)$

# ╔══════════════════════╗
# ║        Hidden        ║
# ╚══════════════════════╝
windowrule = opacity 0.0 override 0.0 override, tag:hidden
windowrule = noinitialfocus,                    tag:hidden
windowrule = maxsize 1 1,                       tag:hidden
windowrule = noanim,                            tag:hidden
windowrule = noblur,                            tag:hidden

# ╔══════════════════════╗
# ║        Layers        ║
# ╚══════════════════════╝
layerrule = blur,                  waybar
layerrule = blurpopups,            1
layerrule = animation popin 90%,   rofi
layerrule = animation fadein,      swww-daemon|verification
layerrule = animation layersIn,    mediamenu|dashboardmenu|audiomenu|networkmenu|calendarmenu|notificationsmenu
layerrule = animation slide right, notifications-window|notifications
layerrule = animation slide up,    waybar|bar-.*
layerrule = noanim,                selection|hyprpicker # Fix for screenshot animation clipping into the shot

# ╔══════════════════════╗
# ║       Inactive       ║
# ╚══════════════════════╝
#layerrule = blur,                  Dunst|notifications
#windowrule = opacity 1.17 1.17, tag:PiP*
#windowrule = float,           $thunderbird, $calendar
#windowrule = size 50% 50%,     title:^(Enter name of file to save to…)$ # Firefox
