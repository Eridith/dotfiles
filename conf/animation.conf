# ╔════════════════════════════════════════════════════════════════════════════╗
# ║                                 Animations                                 ║
# ╚════════════════════════════════════════════════════════════════════════════╝

animations {
    enabled = true

    # == == == == ==
    # ==| Curves |==
    # == == == == ==

    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.38, 0.04, 1, 0.07
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = softAcDecel, 0.26, 0.26, 0.15, 1
    bezier = md2, 0.4, 0, 0.2, 1 # use with .2s duration

    # == == == == == == == == ==
    # ==| Animation configs |==
    # == == == == == == == == ==

    #animation = windows, 1, 3, md3_decel, popin 60%
    animation = windowsIn, 1, 3, md3_decel, popin 90%
    animation = windowsOut, 1, 2, md3_accel, popin 95%
    animation = windowsMove, 1, 3.5, overshot, slide

    animation = border, 1, 10, default
    animation = borderangle, 1, 30, linear, loop

    # animation = layers, 1, 2, md3_decel, slide
    animation = layersIn, 1, 3, overshot, slide
    animation = layersOut, 1, 5, menu_decel, slide

    animation = fade, 1, 3, md3_decel
    #animation = fadeIn, 1, 3, md3_accel
    #animation = fadeOut, 1, 3, md3_decel
    #animation = fadeSwitch, 1, 3, md3_decel
    #animation = fadeShadow, 1, 3, md3_decel
    #animation = fadeDim, 1, 3, md3_decel
    #animation = fadeLayersIn, 1, 2, menu_decel
    #animation = fadeLayersOut, 1, 2, menu_decel

    #animation = workspaces, 1, 6, md3_decel, slidefade 25%
    animation = workspacesIn, 1, 3, hyprnostretch, slidefade 50%
    animation = workspacesOut, 1, 2, easeInOutCirc, slidefade 40%

    #animation = specialWorkspace, 1, 3, md3_decel, slidefadevert 10%
    animation = specialWorkspaceIn, 1, 3, crazyshot, slidefadevert -5%
    animation = specialWorkspaceOut, 1, 3, easeInOutCirc, slidefadevert -15%
}
